<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台首页 - 临床智能决策系统</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; min-height: 100vh; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* 侧边栏规范 */
        .sidebar { width: 220px; background-color: #1a365d; color: #e2e8f0; display: flex; flex-direction: column; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.05);}
        
        .sidebar-brand {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #2a4365;
            padding: 0 15px;
            background-color: #152c4d;
        }

        .sidebar-brand img {
            max-width: 100%;
            max-height: 35px;
            object-fit: contain;
        }

        .nav-menu { padding-top: 15px; }
        .nav-item { padding: 14px 20px; cursor: pointer; border-left: 3px solid transparent; color: #94a3b8; transition: all 0.2s ease; text-decoration: none; display: block; font-size: 14px;}
        .nav-item:hover { background-color: #2a4365; color: #ffffff; }
        .nav-item.active { background-color: #2a4365; color: #ffffff; border-left-color: #3b82f6; font-weight: 500; }

        /* 主内容区 */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; min-width: 0; }
        .top-header { background: #ffffff; height: 50px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; color: #475569; font-size: 13px; z-index: 10; position: relative;}
        
        /* 数据可视化背景效果 */
        .ambient-blob { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .blob-1 { top: -100px; left: -50px; width: 400px; height: 400px; background: #ffffff; animation: float 8s ease-in-out infinite; }
        .blob-2 { bottom: -100px; right: 10%; width: 450px; height: 450px; background: #bfdbfe; animation: float-reverse 10s ease-in-out infinite; opacity: 0.4; }

        @keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(30px) translateX(20px); } }
        @keyframes float-reverse { 0%, 100% { transform: translateY(0) translateX(0); } 50% { transform: translateY(-20px) translateX(-30px); } }

        /* 内容矩阵 */
        .content-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 2; padding: 20px; }
        .center-brand-title { font-size: 56px; font-weight: 900; color: #1e3a8a; margin-bottom: 10px; letter-spacing: 8px; text-shadow: 0 4px 15px rgba(255,255,255,0.8); }
        .center-brand-sub { font-size: 16px; color: #64748b; margin-bottom: 60px; letter-spacing: 2px;}
        
        .grid-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        
        .tool-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #ffffff; border-radius: 12px;
            padding: 40px 25px; text-align: center; cursor: pointer; text-decoration: none; color: #334155;
            transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .tool-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(37,99,235,0.1); border-color: #bfdbfe; }
        .tool-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #1e3a8a; }
        .tool-desc { font-size: 13px; color: #64748b; line-height: 1.6; }

        /* 顶部用户模块 */
        .user-status { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: none; border: 1px solid #cbd5e1; color: #64748b; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .logout-btn:hover { background: #f1f5f9; color: #0f172a; }
    
        @media (max-width: 768px) {
            body { display: block; }
            .sidebar { display: none; }
            .main-content { width: 100%; }
            .top-header { padding: 12px; font-size: 12px; height: auto; }
            .content-body { padding: 16px 12px; justify-content: flex-start; }
            .center-brand-title { font-size: 34px; letter-spacing: 2px; text-align: center; }
            .center-brand-sub { font-size: 13px; margin-bottom: 32px; text-align: center; letter-spacing: 1px; }
            .grid-container { grid-template-columns: 1fr; gap: 16px; }
            .tool-card { padding: 24px 18px; }
        }
    </style>
    <link href="{{ url_for('static', filename='css/mobile.css') }}" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-btn" type="button" onclick="toggleMobileSidebar()" aria-label="打开导航">☰</button>
    <div class="mobile-mask" onclick="closeMobileSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="{{ url_for('static', filename='assets/logo.jpg') }}" alt="系统Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none; color: #fff; font-size: 18px; font-weight: bold;">一宠一配方</span>
        </div>
        <nav class="nav-menu">
            <a href="{{ url_for('home') }}" class="nav-item active">平台首页</a>
            <a href="{{ url_for('chat') }}" class="nav-item">智能问诊台</a>
            <a href="{{ url_for('dashboard') }}" class="nav-item">深度健康评估</a>
            <a href="{{ url_for('community') }}" class="nav-item">宠主社区</a>
            <a href="{{ url_for('reminder') }}" class="nav-item">健康提醒</a>
            <a href="{{ url_for('profile') }}" class="nav-item">个人中心</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <span>首页 / 平台功能矩阵</span>
            <div class="user-status">
                <span id="currentUserDisplay" style="font-weight: 600; color: #1a365d;">游客模式</span>
                <button class="logout-btn" onclick="handleLogout()">注销</button>
            </div>
        </header>
        
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>

        <section class="content-body">
            <div class="center-brand-title">一宠一配方</div>
            <div class="center-brand-sub">赋能宠物医疗全链路 · AI 驱动精准营养</div>

            <div class="grid-container">
                <a href="{{ url_for('chat') }}" class="tool-card">
                    <div class="tool-title">智能问诊台</div>
                    <div class="tool-desc">基于行业大模型驱动的自然语言问诊交互与临床决策支持</div>
                </a>
                
                <a href="{{ url_for('dashboard') }}" class="tool-card">
                    <div class="tool-title">深度健康评估</div>
                    <div class="tool-desc">结构化录入医学检测指标，生成多维度的病理与营养干预报告</div>
                </a>
                
                <a href="{{ url_for('community') }}" class="tool-card">
                    <div class="tool-title">宠主社区</div>
                    <div class="tool-desc">全生命周期养育经验沉淀，结构化知识图谱与互助答疑网络</div>
                </a>
                
                <a href="{{ url_for('reminder') }}" class="tool-card">
                    <div class="tool-title">健康提醒</div>
                    <div class="tool-desc">动态生成长周期换粮过渡方案与复诊时间轴追踪体系</div>
                </a>
            </div>
        </section>
    </main>

    <script>
        // 权限校验逻辑
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/me', {
                    credentials: 'include'
                });

                if (!response.ok) {
                    window.location.href = "{{ url_for('login') }}";
                    return;
                }

                const result = await response.json();
                document.getElementById('currentUserDisplay').innerText =
                    `欢迎, ${result.data.username}`;
            } catch (e) {
                window.location.href = "{{ url_for('login') }}";
            }
        });

        async function handleLogout() {
            await fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            });
            window.location.href = "{{ url_for('login') }}";
        }

                
    </script>
<script src="{{ url_for('static', filename='js/global_reminder.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mobile.js') }}"></script>
</body>
</html>
